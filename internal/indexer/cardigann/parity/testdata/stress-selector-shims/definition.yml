---
id: selectorshims
name: selectorshims
description: "Synthetic tracker exercising the :has row selector and :contains case-key shims."
language: en-US
type: private
encoding: UTF-8
links:
  - https://shim.test/

caps:
  categorymappings:
    - {id: 1, cat: Movies}
  modes:
    search: [q]

search:
  path: /browse
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: tr:has(a.dl)
  fields:
    title:
      selector: a.title
    download:
      selector: a.dl
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    leechers:
      selector: td.leechers
    category:
      text: "1"
    downloadvolumefactor:
      case:
        "td:contains(\"Freeleech\")": "0"
        "*": "1"
