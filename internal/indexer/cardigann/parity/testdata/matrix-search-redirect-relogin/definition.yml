---
id: redirrelogin
name: redirrelogin
description: "Synthetic private tracker: an unfollowed search 302 is the logged-out signal (relogin + retry)."
language: en-US
type: private
encoding: UTF-8
links:
  - https://relogin.test/

caps:
  categories:
    "1": Movies

  modes:
    search: [q]

login:
  path: /login.php
  method: get
  test:
    path: /profile
    selector: a.logout

search:
  paths:
    - path: search
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: tr.row
  fields:
    title:
      selector: a.title
    download:
      selector: a.dl
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    leechers:
      selector: td.leechers
    category:
      text: "1"
