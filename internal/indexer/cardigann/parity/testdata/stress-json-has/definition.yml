---
id: jsonhas
name: jsonhas
description: "Synthetic JSON-API tracker exercising the JSON :has row-selector shim."
language: en-US
type: public
encoding: UTF-8
links:
  - https://jsonhas.test/

caps:
  categories:
    movies: Movies
    tv: TV
  modes:
    search: [q]

search:
  paths:
    - path: /api/search
      response:
        type: json
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: results:has(dl)
  fields:
    title:
      selector: name
    download:
      selector: dl
    size:
      selector: size
    seeders:
      selector: seeders
    leechers:
      selector: leechers
    category:
      selector: cat
