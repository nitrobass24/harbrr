  contract (IPTorrentsParser) — NOT a live capture. See testdata/README.md.

  The header columns are in a DELIBERATELY non-default order so the test proves
  the parser resolves the size/snatches/seeders/leechers columns by header text
  (the "Sort by …" links), not by a hardcoded index:

    th[0] = category-icon column (no header link)
    th[1] = Name
    th[2] = Sort by snatches   (grabs)
    th[3] = Sort by size       (Prowlarr default would be 5 -> wrong)
    th[4] = Sort by seeders
    th[5] = Sort by leechers

  Each body row carries six <td> cells in the same order. lout.php in the page
  proves the logged-in marker the Test() check looks for.
-->
