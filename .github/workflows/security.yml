name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded PR runs; never cancel main-branch history.
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # gitleaks scans full commit history
      # gitleaks is the source-of-truth scanner; .gitleaks.toml extends the default
      # ruleset and allowlists the synthetic test-fixture paths. We run the gitleaks
      # BINARY directly (pinned by version + SHA-256) rather than gitleaks/gitleaks-action,
      # which requires a paid GITLEAKS_LICENSE on organization repos. The CLI is free.
      - name: install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks version
      - name: gitleaks scan
        run: ./gitleaks git . --config .gitleaks.toml --redact --exit-code 1
      # Targeted backstop for the tracker-credential shapes harbrr handles, the
      # same check as pre-commit but enforced where --no-verify cannot skip it.
      - name: tracker-secret backstop
        run: scripts/check-no-secrets.sh --all
