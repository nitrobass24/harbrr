name: docs

# Build the MkDocs Material site (website/) and publish it to GitHub Pages.
#
# ACTIVATION: GitHub Pages needs the repo to be PUBLIC (or an org paid plan) with
# Settings -> Pages -> Source set to "GitHub Actions". While the repo is private on the
# Free plan, Pages is unavailable — so this workflow is manual-only for now. When you go
# public and enable Pages (see the pre-alpha checklist, #14), uncomment the `push` trigger
# below so the site auto-deploys on every docs change to main.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - "website/**"
  #     - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys; never cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    name: build & deploy docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.x"
          cache: pip
      - name: install mkdocs-material
        run: pip install mkdocs-material
      - name: build (strict — broken links/nav fail the build)
        working-directory: website
        run: mkdocs build --strict
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: website/site
      - name: deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
