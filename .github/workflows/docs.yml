name: docs

# Build the MkDocs Material site (website/) and publish it to GitHub Pages.
#
# ACTIVATION: GitHub Pages needs the repo to be PUBLIC (or an org paid plan) with
# Settings -> Pages -> Source set to "GitHub Actions". While the repo is private on the
# Free plan, Pages is unavailable — so this workflow is manual-only for now. When you go
# public and enable Pages (see the pre-alpha checklist, #14), uncomment the `push` trigger
# below so the site auto-deploys on every docs change to main.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - "website/**"
  #     - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys; never cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    name: build & deploy docs
    runs-on: [self-hosted, Linux, X64, docker, optane]
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
          cache: pip
      - name: install mkdocs-material
        run: pip install mkdocs-material
      - name: build (strict — broken links/nav fail the build)
        working-directory: website
        run: mkdocs build --strict
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: website/site
      - name: deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
